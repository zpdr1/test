<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录中... - 七亿测试中心</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    .loader {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .error {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }
    a {
      color: white;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="loader" id="loader"></div>
    <h2 id="status">正在登录...</h2>
    <div class="error" id="error" style="display: none;">
      <p id="errorMsg">登录失败，请<a href="/">返回重试</a></p>
    </div>
  </div>

  <script>
    // 简化的认证处理（无需外部依赖）
    const AUTH_URL = 'https://auth.7e.ink';
    const CLIENT_ID = 'test';
    const REDIRECT_URI = 'https://test.7e.ink/callback.html';
    
    // 获取 URL 参数
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const error = urlParams.get('error');
    const state = urlParams.get('state'); // 测试类型
    
    async function handleCallback() {
      if (error) {
        showError('登录已取消');
        return;
      }
      
      if (!code) {
        showError('缺少授权参数');
        return;
      }
      
      try {
        // 向 auth.7e.ink 换取 token
        const response = await fetch(`${AUTH_URL}/oauth/token`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            grant_type: 'authorization_code',
            client_id: CLIENT_ID,
            code: code,
            redirect_uri: REDIRECT_URI
          })
        });
        
        const data = await response.json();
        
        if (data.access_token) {
          // 保存 token
          localStorage.setItem('auth_token', data.access_token);
          
          // 获取用户信息
          const userResponse = await fetch(`${AUTH_URL}/oauth/userinfo`, {
            headers: { Authorization: `Bearer ${data.access_token}` }
          });
          
          const userData = await userResponse.json();
          
          if (userData.id) {
            localStorage.setItem('auth_user', JSON.stringify(userData));
          }
          
          // 获取跳转地址
          const redirect = sessionStorage.getItem('auth_redirect') || 'https://test.7e.ink';
          sessionStorage.removeItem('auth_redirect');
          
          // 跳转
          window.location.href = redirect;
        } else {
          showError('获取令牌失败');
        }
      } catch (err) {
        console.error('OAuth error:', err);
        showError('网络错误，请重试');
      }
    }
    
    function showError(msg) {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('status').textContent = '登录失败';
      document.getElementById('errorMsg').innerHTML = msg + '，<a href="https://test.7e.ink">返回测试中心</a>';
      document.getElementById('error').style.display = 'block';
    }
    
    // 执行
    handleCallback();
  </script>
</body>
</html>

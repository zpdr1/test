<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>你的爱情观是什么类型？ | LVTI 爱情观测试指标</title>
  <meta name="description" content="测测你的爱情人格类型，发现你在亲密关系中的真实模式。20道精选题目，16种爱情人格，3分钟了解你的爱情观。">
  <meta name="keywords" content="爱情测试,爱情观,恋爱类型,LVTI,情侣测试">
  <link rel="canonical" href="https://lvti.7e.ink/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="你的爱情观是什么类型？">
  <meta property="og:description" content="测测你的爱情人格类型，发现你在亲密关系中的真实模式。">
  <meta property="og:url" content="https://lvti.7e.ink/">
  <meta property="og:site_name" content="LVTI 爱情观测试">
  <link rel="icon" href="favicon.ico">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      background: linear-gradient(135deg, #fff0f3 0%, #ffd6e0 25%, #ffb8d0 50%, #ffc4d6 75%, #fff0f5 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      min-height: 100vh;
      color: #5a3d4a;
      padding-top: 48px;
      overflow-x: hidden;
      position: relative;
    }

    /* 背景渐变动画 */
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* 浮动爱心背景 */
    .floating-hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      font-size: 20px;
      opacity: 0.15;
      animation: floatHeart 20s infinite linear;
    }

    .heart:nth-child(1) { left: 10%; animation-delay: 0s; font-size: 24px; }
    .heart:nth-child(2) { left: 20%; animation-delay: -3s; font-size: 18px; }
    .heart:nth-child(3) { left: 35%; animation-delay: -6s; font-size: 22px; }
    .heart:nth-child(4) { left: 50%; animation-delay: -9s; font-size: 16px; }
    .heart:nth-child(5) { left: 65%; animation-delay: -12s; font-size: 20px; }
    .heart:nth-child(6) { left: 80%; animation-delay: -15s; font-size: 26px; }
    .heart:nth-child(7) { left: 90%; animation-delay: -18s; font-size: 14px; }

    @keyframes floatHeart {
      0% {
        transform: translateY(100vh) rotate(0deg) scale(0.5);
        opacity: 0;
      }
      10% {
        opacity: 0.15;
      }
      90% {
        opacity: 0.15;
      }
      100% {
        transform: translateY(-100px) rotate(720deg) scale(1);
        opacity: 0;
      }
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    /* 标题区域 */
    .header {
      text-align: center;
      padding: 40px 20px 30px;
    }

    .header-icon {
      font-size: 3em;
      margin-bottom: 10px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .header h1 {
      font-size: 2.2em;
      margin-bottom: 15px;
      background: linear-gradient(135deg, #d63384, #ff69b4, #ff85a2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 2px 8px rgba(214, 51, 132, 0.3));
    }

    .header p {
      font-size: 1.1em;
      color: #8b5a6b;
      line-height: 1.9;
    }

    .tags {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .tag {
      background: rgba(255, 255, 255, 0.8);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85em;
      color: #d63384;
      border: 1px solid rgba(214, 51, 132, 0.2);
      box-shadow: 0 2px 8px rgba(214, 51, 132, 0.1);
      transition: all 0.3s ease;
    }

    .tag:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(214, 51, 132, 0.2);
    }

    /* 测试区域 */
    .test-area {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      padding: 35px 30px;
      margin-top: 20px;
      box-shadow: 
        0 10px 40px rgba(214, 51, 132, 0.15),
        0 0 0 1px rgba(255, 255, 255, 0.5) inset;
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }

    .test-area::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 30%, rgba(255, 182, 193, 0.1) 0%, transparent 50%);
      animation: shimmer 8s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes shimmer {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(10%, 10%); }
    }

    /* 进度条 - 爱心样式 */
    .progress-container {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 25px;
    }

    .progress-bar {
      flex: 1;
      background: linear-gradient(90deg, #ffe0e6, #ffd0d8);
      border-radius: 12px;
      height: 10px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      background: linear-gradient(90deg, #ff69b4, #d63384, #ff85a2);
      height: 100%;
      border-radius: 12px;
      transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      box-shadow: 0 0 10px rgba(214, 51, 132, 0.5);
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      animation: progressShine 2s ease-in-out infinite;
    }

    @keyframes progressShine {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .progress-heart {
      font-size: 1.5em;
      animation: heartbeat 1.5s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.2); }
      50% { transform: scale(1); }
      75% { transform: scale(1.1); }
    }

    .question-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(214, 51, 132, 0.1);
    }

    .question-number {
      font-size: 0.95em;
      color: #d63384;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .question-type {
      font-size: 0.8em;
      color: #999;
      background: linear-gradient(135deg, #fff5f7, #ffe8ec);
      padding: 4px 12px;
      border-radius: 12px;
      border: 1px solid rgba(214, 51, 132, 0.1);
    }

    .question-text {
      font-size: 1.25em;
      line-height: 1.9;
      margin-bottom: 25px;
      color: #5a3d4a;
      position: relative;
      z-index: 1;
      min-height: 80px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      z-index: 1;
    }

    .option {
      background: linear-gradient(135deg, #fff8fa 0%, #fff0f3 100%);
      border: 2px solid rgba(214, 51, 132, 0.1);
      border-radius: 18px;
      padding: 18px 22px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-size: 1em;
      color: #5a3d4a;
      text-align: left;
      position: relative;
      overflow: hidden;
    }

    .option::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      transition: left 0.5s ease;
    }

    .option:hover::before {
      left: 100%;
    }

    .option:hover {
      border-color: rgba(214, 51, 132, 0.5);
      transform: translateX(8px);
      box-shadow: 
        0 8px 25px rgba(214, 51, 132, 0.2),
        0 0 0 4px rgba(214, 51, 132, 0.05);
    }

    .option.selected {
      background: linear-gradient(135deg, #d63384 0%, #ff69b4 50%, #ff85a2 100%);
      color: white;
      border-color: transparent;
      box-shadow: 
        0 8px 30px rgba(214, 51, 132, 0.4),
        0 0 0 4px rgba(255, 255, 255, 0.2) inset;
      transform: translateX(8px) scale(1.02);
    }

    .option.selected::after {
      content: '💕';
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2em;
      animation: popIn 0.3s ease-out;
    }

    @keyframes popIn {
      0% { transform: translateY(-50%) scale(0); }
      50% { transform: translateY(-50%) scale(1.3); }
      100% { transform: translateY(-50%) scale(1); }
    }

    .buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 30px;
      gap: 15px;
      position: relative;
      z-index: 1;
    }

    .btn {
      padding: 14px 32px;
      border: none;
      border-radius: 30px;
      font-size: 1em;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-weight: 500;
    }

    .btn-prev {
      background: linear-gradient(135deg, #f8f8f8, #f0f0f0);
      color: #666;
      border: 1px solid rgba(0, 0, 0, 0.05);
    }

    .btn-prev:hover:not(:disabled) {
      background: linear-gradient(135deg, #fff, #f8f8f8);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .btn-prev:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-next {
      background: linear-gradient(135deg, #d63384 0%, #ff69b4 50%, #ff85a2 100%);
      color: white;
      flex: 1;
      box-shadow: 0 4px 20px rgba(214, 51, 132, 0.3);
      position: relative;
      overflow: hidden;
    }

    .btn-next::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      animation: btnShine 3s ease-in-out infinite;
    }

    @keyframes btnShine {
      0%, 100% { left: -100%; }
      50% { left: 100%; }
    }

    .btn-next:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(214, 51, 132, 0.4);
    }

    .btn-next:active {
      transform: translateY(-1px);
    }

    /* 页脚 */
    .footer {
      text-align: center;
      padding: 40px 20px;
      color: #8b5a6b;
      font-size: 0.9em;
    }

    .footer a {
      color: #d63384;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .footer a:hover {
      color: #ff69b4;
      text-decoration: underline;
    }

    /* 加载动画 */
    .loading-dots {
      display: inline-flex;
      gap: 4px;
    }

    .loading-dots span {
      animation: dotPulse 1.4s ease-in-out infinite;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotPulse {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }

    /* 移动端适配 */
    @media (max-width: 600px) {
      .header {
        padding: 30px 15px 20px;
      }

      .header-icon {
        font-size: 2.5em;
      }

      .header h1 {
        font-size: 1.6em;
      }

      .header p {
        font-size: 1em;
      }

      .test-area {
        padding: 25px 20px;
        border-radius: 20px;
      }

      .question-text {
        font-size: 1.1em;
        min-height: 60px;
      }

      .option {
        padding: 16px 18px;
        font-size: 0.95em;
        border-radius: 14px;
      }

      .option.selected::after {
        display: none;
      }

      .buttons {
        flex-direction: column;
        gap: 12px;
      }

      .btn {
        width: 100%;
      }

      .btn-prev {
        order: 2;
      }

      .btn-next {
        order: 1;
      }

      .heart {
        display: none;
      }
    }
  </style>
</head>
<body>
  <!-- 浮动爱心背景 -->
  <div class="floating-hearts">
    <div class="heart">💕</div>
    <div class="heart">💗</div>
    <div class="heart">💖</div>
    <div class="heart">💝</div>
    <div class="heart">💕</div>
    <div class="heart">💗</div>
    <div class="heart">💖</div>
  </div>

  <!-- 登录栏由 auth-ui.js 自动插入 -->

  <div class="container">
    <div class="header">
      <div class="header-icon">💕</div>
      <h1>你的爱情观是什么类型？</h1>
      <p>这不是普通的性格测试，而是探索你在亲密关系中的真实模式。<br>全程约 3 分钟，20 道精选题目，发现你的爱情人格。</p>
      <div class="tags">
        <span class="tag">💝 单选题</span>
        <span class="tag">🌸 场景题</span>
        <span class="tag">💫 价值观</span>
        <span class="tag">✨ 行为模式</span>
      </div>
    </div>

    <div class="test-area">
      <div class="progress-container">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 5%"></div>
        </div>
        <span class="progress-heart">💗</span>
      </div>

      <div class="question-meta">
        <span class="question-number">📍 <span id="questionNumber">第 1 / 20 题</span></span>
        <span class="question-type" id="questionType">单选题</span>
      </div>

      <h2 class="question-text" id="questionText">加载中...</h2>

      <div class="options" id="options">
        <!-- 选项由 JS 动态生成 -->
      </div>

      <div class="buttons">
        <button class="btn btn-prev" id="prevBtn" onclick="prevQuestion()" disabled>← 上一题</button>
        <button class="btn btn-next" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
      </div>
    </div>

    <div class="footer">
      <a href="https://test.7e.ink">← 返回测试中心</a>
      <span style="margin: 0 15px; opacity: 0.5;">|</span>
      <a href="https://7e.ink">七亿主页</a>
      <p style="margin-top: 15px;">© 2026 <a href="https://7e.ink">7e.ink</a> · 域名：lvti.7e.ink</p>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>TestAuth.init('lvti');</script>
  <script src="auth-ui.js"></script>
  <script src="questions.js"></script>
  <script src="results.js"></script>
  <script src="app.js"></script>
</body>
</html>
